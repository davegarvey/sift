name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install grubble
        run: |
          curl -sSL -o grubble.tar.gz \
            "https://github.com/davegarvey/grubble/releases/download/v5.3.0/grubble-linux-x86_64.tar.gz"
          tar xzf grubble.tar.gz
          chmod +x grubble

      - name: Bump version
        id: bump
        run: |
          PREV=$(./grubble --raw --preset node)
          echo "PREV=$PREV"
          BUMP_TYPE=$(./grubble --bump-type)
          echo "BUMP_TYPE=$BUMP_TYPE"
          ./grubble --tag --preset node --package-files package.json
          NEW=$(./grubble --raw --preset node)
          echo "NEW=$NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

      - name: Push release branch and create PR
        if: steps.bump.outputs.bump_type != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          BRANCH="release/v${VERSION}"
          git checkout -b "${BRANCH}"
          git push --set-upstream origin "${BRANCH}"
          git push --tags --force
          PR_URL=$(gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "Release v${VERSION}" \
            --body "Automated release PR created by grubble.")
          gh pr merge "$PR_URL" --auto --squash
